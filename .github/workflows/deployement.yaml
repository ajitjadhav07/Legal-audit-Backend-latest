name: Build and Push Backend + Worker Images

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION:       ap-south-1
      BACKEND_ECR_REPO: legal-audit-uat-backend
      WORKER_ECR_REPO:  legal-audit-uat-worker
      IMAGE_TAG:        latest          # ← fixed: was "updated", CFN expects "latest"

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. AWS credentials ────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 3. ECR login ──────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Backend ────────────────────────────────────────────────────────
      - name: Build Backend Docker image
        run: |
          docker build \
            -t ${{ env.BACKEND_ECR_REPO }}:${{ env.IMAGE_TAG }} \
            -f Dockerfile .

      - name: Tag Backend image
        run: |
          docker tag \
            ${{ env.BACKEND_ECR_REPO }}:${{ env.IMAGE_TAG }} \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPO }}:${{ env.IMAGE_TAG }}

      - name: Push Backend image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPO }}:${{ env.IMAGE_TAG }}

      # ── 5. Worker ─────────────────────────────────────────────────────────
      - name: Build Worker Docker image
        run: |
          docker build \
            -t ${{ env.WORKER_ECR_REPO }}:${{ env.IMAGE_TAG }} \
            -f Dockerfile.worker .

      - name: Tag Worker image
        run: |
          docker tag \
            ${{ env.WORKER_ECR_REPO }}:${{ env.IMAGE_TAG }} \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.WORKER_ECR_REPO }}:${{ env.IMAGE_TAG }}

      - name: Push Worker image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.WORKER_ECR_REPO }}:${{ env.IMAGE_TAG }}

      # ── 6. Force new ECS deployments ─────────────────────────────────────
      - name: Deploy Backend to ECS
        run: |
          aws ecs update-service \
            --cluster legal-audit-cluster \
            --service legal-audit-backend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "✅ Backend ECS deployment triggered"

      - name: Deploy Worker to ECS
        run: |
          aws ecs update-service \
            --cluster legal-audit-cluster \
            --service legal-audit-worker \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "✅ Worker ECS deployment triggered"
